appId: com.slapglif.agentoverlay.debug
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Agent Overlay"
    timeout: 5000
- assertVisible: "Tiny command button → quick actions → agent view"
- tapOn: "Connect"
- extendedWaitUntil:
    visible: "Live Hermes run"
    timeout: 10000
- extendedWaitUntil:
    visible: "Ready · Auto"
- assertVisible: "Ready · Auto"
- assertVisible: "Ask Hermes…"
- tapOn: "Ask Hermes…"
- inputText: "/"
- assertVisible: "Hermes commands"
- assertVisible: "/commands"
- eraseText
- inputText: "status check from Android"
- pressKey: BACK
- tapOn: "Send message"
- extendedWaitUntil:
    visible: "Mock Hermes acknowledged: status check from Android phone tools armed"
    timeout: 10000
- tapOn: "Open chat tools"
- assertVisible: "Inspect phone"
- tapOn: "Inspect phone"
- assertVisible: "Phone automation is not enabled. Enable Agent Overlay Control in Android Accessibility settings."
